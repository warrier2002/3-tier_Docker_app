services:
  db:
    image: postgres:16-alpine
    env_file: .env                 
    volumes:
      - db_data:/var/lib/postgresql/data   
    ports:
      - "5433:5432"                # 5433 on your computer -> 5432 in the container
    healthcheck:                    # checks if the DB is ready
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2) BACKEND
  backend:
    image: ${DOCKERHUB_USER}/3tier-backend:latest
    env_file: .env                 # tells it how to connect to the database
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy # wait until the database is ready
    healthcheck:                    # checks if the API answers
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # 3) FRONTEND 
  frontend:
    image: ${DOCKERHUB_USER}/3tier-frontend:latest
    ports:
      - "8081:80"                  # open http://localhost:8081 in your browser
    depends_on:
      backend:
        condition: service_healthy # wait until the backend is ready
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 5

# Named volume for the database (saved on your computer, not inside the container)
volumes:
  db_data:
